[project]
site_name = "Pytest LLM Report"
repo_url = "https://github.com/callowayproject/pytest-llm-report"
edit_uri = "edit/main/docs/"
use_directory_urls = true
extra_javascript = [
    "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML",
]
extra_css = [
    "assets/css/extra.css",
    "assets/css/mkdocstrings.css",
    "assets/css/cards.css",
    "assets/css/field-list.css",
]

[project.theme]
favicon = "assets/favicon.png"
logo = "assets/logo.png"
features = [
    "navigation.sections",
    "navigation.path",
    "navigation.top",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.tabs.link",
    "toc.integrate",
]

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.blocks.caption]

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.tables]

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["pytest_llm_report"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
allow_inspection = true
docstring_section_style = "spacy"
enable_inventory = true
group_by_category = true
line_length = 80
members_order = "alphabetical"
merge_init_into_class = true
separate_signature = true
show_docstring_parameters = true
show_root_toc_entry = true
show_signature_annotations = true
show_symbol_type_heading = true
show_symbol_type_toc = true
show_category_heading = true
signature_crossrefs = true
summary = true

[project.plugins.gen-files]
scripts = ["docs/gen_doc_stubs.py"]
